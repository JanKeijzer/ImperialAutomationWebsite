<style>
  .header-logo-full { display: block; }
  .header-logo-icon { display: none; }
  @media (max-width: 640px) {
    .header-logo-full { display: none; }
    .header-logo-icon { display: block; }
  }
</style>
<header style="position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(30,58,138,0.08); padding: 0.75rem 1.25rem; display: flex; align-items: center; justify-content: space-between;">
  <a href="{{ "/" | relLangURL }}">
    <img src="/assets/logo-horizontal.svg" alt="Imperial Automation" class="header-logo-full" style="height: 36px; width: auto;">
    <img src="/assets/logo-icon.svg" alt="Imperial Automation" class="header-logo-icon" style="height: 32px; width: auto;">
  </a>
  <div style="display: flex; align-items: center; gap: 1rem;">
    <a href="https://calendly.com/imperial-automation/introduction-call" style="display: inline-block; background: #FCD34D; color: #1E3A8A; font-weight: 700; font-size: 0.875rem; padding: 0.5rem 1.25rem; border-radius: 6px; text-decoration: none; white-space: nowrap;">
      {{ i18n "bookCall" }}
    </a>
    {{- $flags := dict "en" "🇬🇧" "nl" "🇳🇱" "hu" "🇭🇺" -}}
    {{- range .Translations }}
    <a href="{{ .Permalink }}" title="{{ .Language.LanguageName }}" style="font-size: 1.25rem; text-decoration: none; line-height: 1;">{{ index $flags .Lang }}</a>
    {{- end }}
  </div>
</header>
